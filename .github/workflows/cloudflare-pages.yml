# Optional: deploy /public to Cloudflare Pages via GitHub Actions (manual trigger only).
# Primary deploy path: Cloudflare Pages → Connect to Git (production branch main, output public).
# Keeps this workflow available without burning Actions minutes or failing when billing is locked.

name: Deploy Cloudflare Pages

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: worksmart
          directory: public
