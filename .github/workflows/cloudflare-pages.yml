# Deploy /public to Cloudflare Pages on every push to main (production).
# Requires CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID in repo Actions secrets.
# workflow_dispatch: rerun a deploy from the Actions UI without a new commit.

name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Inject form analytics Worker URL (optional)
        env:
          FORM_ANALYTICS_WORKER_URL: ${{ vars.FORM_ANALYTICS_WORKER_URL }}
        run: node scripts/inject-analytics-endpoint.mjs

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: worksmart
          directory: public

      - name: Verify production (Pages + optional Worker)
        run: node scripts/verify-prod.mjs

      - name: Verify telemetry ingest (when analytics endpoint is configured)
        if: ${{ vars.FORM_ANALYTICS_WORKER_URL != '' }}
        run: node scripts/verify-telemetry.mjs

      - name: Notify Slack on failure (optional)
        if: ${{ failure() }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_ALERT_COOLDOWN_MINUTES: ${{ vars.SLACK_ALERT_COOLDOWN_MINUTES }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          WORKFLOW_FILE: cloudflare-pages.yml
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json, os, urllib.request
          from datetime import datetime, timezone

          if not os.environ.get("SLACK_WEBHOOK_URL", "").strip():
              print("Slack webhook not configured; skipping alert.")
              raise SystemExit(0)

          repo = os.environ["REPO"]
          run_id = os.environ["RUN_ID"]
          ref_name = os.environ["REF_NAME"]
          sha = os.environ["SHA"][:7]
          workflow_file = os.environ["WORKFLOW_FILE"]
          gh_token = os.environ["GITHUB_TOKEN"]
          cooldown_min = int(os.environ.get("SLACK_ALERT_COOLDOWN_MINUTES") or 30)
          run_url = f"https://github.com/{repo}/actions/runs/{run_id}"

          # Deduplicate noisy alerts during ongoing outages.
          try:
              api = (
                  f"https://api.github.com/repos/{repo}/actions/workflows/{workflow_file}/runs"
                  f"?status=completed&branch={ref_name}&per_page=20"
              )
              req = urllib.request.Request(
                  api,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {gh_token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(req, timeout=15) as r:
                  runs = json.load(r).get("workflow_runs", [])
              previous_failed = None
              for run in runs:
                  if str(run.get("id")) == str(run_id):
                      continue
                  if run.get("conclusion") == "failure":
                      previous_failed = run
                      break
              if previous_failed:
                  t = previous_failed.get("updated_at") or previous_failed.get("created_at")
                  if t:
                      dt = datetime.fromisoformat(t.replace("Z", "+00:00"))
                      age_min = (datetime.now(timezone.utc) - dt).total_seconds() / 60.0
                      if age_min < cooldown_min:
                          print(
                              f"Skipping Slack alert: prior failed run {previous_failed.get('id')} "
                              f"is {age_min:.1f}m old (< {cooldown_min}m cooldown)."
                          )
                          raise SystemExit(0)
          except SystemExit:
              raise
          except Exception as e:
              # Do not block alerts if dedupe check fails unexpectedly.
              print(f"Dedupe check skipped: {e}")

          text = (
              f":rotating_light: Deploy Cloudflare Pages failed for `{repo}` "
              f"on `{ref_name}` (`{sha}`).\n{run_url}"
          )
          body = json.dumps({"text": text}).encode("utf-8")
          req = urllib.request.Request(
              os.environ["SLACK_WEBHOOK_URL"],
              data=body,
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          urllib.request.urlopen(req, timeout=15).read()
          print("Slack alert sent.")
          PY
