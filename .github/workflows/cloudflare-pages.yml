# Optional: deploy /public to Cloudflare Pages via GitHub Actions.
# - Runs on push to main when site assets under public/ change (so merges that touch the site deploy).
# - workflow_dispatch still available for a full redeploy any time.
# Primary path without Actions: Cloudflare Pages → Connect to Git (production branch main, output public).

name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - "public/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: worksmart
          directory: public
