# Deploy /public to Cloudflare Pages on every push to main (production).
# Requires CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID in repo Actions secrets.
# workflow_dispatch: rerun a deploy from the Actions UI without a new commit.

name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: worksmart
          directory: public
